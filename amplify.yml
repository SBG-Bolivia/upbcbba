version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - env | grep -E '^(SUPABASE_|NEXT_PUBLIC_SUPABASE_|NEXT_PUBLIC_BASE_URL|SBG_|ADMIN_PASSWORD)=' >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
          - .npm/**/*
